<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <title>Menú - Supervivent a l'Illa</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            /* Fons animat pel menú */
            background-image: url("images/island.gif");
            /* Aquí hem posat el teu GIF */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            /* Color de fons per si el GIF triga a carregar */
        }

        /* Efecte de capa ambient tropical per realçar */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Aquest gradient fosc/daurat ajuda a que el menú ressalti per sobre del GIF animat */
            background: radial-gradient(ellipse at center, rgba(255, 200, 100, 0.15) 0%, rgba(70, 130, 180, 0.25) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Cartell de fusta - COMPACTE */
        .menu-box {
            background-color: rgba(62, 39, 35, 0.95);
            border: 6px solid #8D6E63;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0, 0, 0, 0.4);
            padding: 35px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 1;
            border-radius: 8px;
        }

        .menu-box h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 26px;
            color: #2ecc71;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px #000;
            line-height: 1.3;
        }

        .menu-box p {
            font-family: 'Press Start 2P', cursive;
            color: #ecf0f1;
            font-size: 12px;
            line-height: 1.8;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-box .hint {
            color: #f1c40f;
            font-size: 10px;
            margin-bottom: 30px;
        }

        .menu-box button {
            font-family: 'Press Start 2P', cursive;
            padding: 15px 30px;
            font-size: 16px;
            background-color: #f1c40f;
            color: #2c3e50;
            border: 4px solid #fff;
            box-shadow: inset -3px -3px 0px rgba(0, 0, 0, 0.2), 5px 5px 0px #000;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, background-color 0.2s;
            border-radius: 5px;
        }

        .menu-box button:hover {
            background-color: #f39c12;
            transform: scale(1.05);
            box-shadow: inset -3px -3px 0px rgba(0, 0, 0, 0.2), 7px 7px 0px #000;
        }

        .menu-box button:active {
            transform: translate(2px, 2px) scale(1.02);
            box-shadow: inset -3px -3px 0px rgba(0, 0, 0, 0.2), 2px 2px 0px #000;
        }
    </style>
</head>

<body>

    <div class="menu-box">
        <h1>BENVINGUT A L'ILLA!</h1>
        <p>Troba les 5 fustes per arreglar el vaixell abans que les aranyes t'atrapin!</p>
        <p class="hint">👉 Fes servir les FLETXES del teclat per moure't</p>

        <button onclick="window.location.href='pirate.html'">Comença el joc</button>
    </div>

</body>

</html>
